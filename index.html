    <style>
        /* CSS Tambahan biar tampilan rapi & Adaptive */
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Perbaikan untuk HP (Layar di bawah 768px) */
        @media (max-width: 768px) {
            /* 1. Mencegah konten nabrak Poni/Notch */
            body {
                padding-top: env(safe-area-inset-top, 20px);
                padding-bottom: env(safe-area-inset-bottom, 20px);
            }

            .judul { 
                font-size: 1.8rem !important; 
                text-align: center; 
                margin-top: 40px !important; 
                width: 100%;
            }

            .judulslide3 { font-size: 1.6rem !important; text-align: center; }
            
            /* 2. Lanyard: Berubah dari melayang jadi berbaris rapi */
            .lanyard {
                position: relative !important;
                width: 85% !important;
                margin: 15px auto !important;
                left: 0 !important;
                right: 0 !important;
                transform: none !important;
            }

            .card {
                margin: 0 auto;
                width: 100% !important;
            }

            /* Mencegah gambar Lanyard segede gaban */
            .card img {
                width: 100% !important;
                max-width: 200px; /* Batasin biar gak menuhin layar */
                height: auto;
            }
            
            /* 3. Social Counter: Jadi atas-bawah */
            .social-counter {
                flex-direction: column !important;
                align-items: center !important;
                gap: 20px !important;
                padding: 0 10px !important;
            }
            
            .counter-box {
                width: 100% !important;
                max-width: 350px;
            }

            .video-wrapper {
                position: relative !important;
                width: 85% !important;
                margin: 40px auto 20px auto !important;
                padding-bottom: 56.25% !important; /* Rasio 16:9 murni */
                height: 0 !important;
                overflow: hidden !important;
                border-radius: 15px !important;
                background: #000 !important;
            }
            .video-wrapper iframe {
                position: absolute !important;
                top: 0 !important;
                left: 0 !important;
                width: 100% !important;
                height: 100% !important;
                border: 0 !important;
            }


            /* 5. University Tabs */
            .university-tabs {
                flex-wrap: wrap !important;
                justify-content: center !important;
                gap: 15px !important;
                display: flex;
            }
            
            .uni-card {
                width: 40% !important;
                min-width: 120px;
            }

            .uni-card img {
                width: 100%;
                height: auto;
            }
            
            /* 6. Slide Adaptive */
            .slide {
                padding: 40px 15px !important;
                height: auto !important;
                min-height: 100vh !important;
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
                align-items: center;
                box-sizing: border-box;
            }

            .social {
                justify-content: center !important;
                margin-bottom: 20px !important;
                display: flex;
                gap: 15px;
            }
        }
    </style>
</head>
