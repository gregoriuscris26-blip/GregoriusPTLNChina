<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gregorius.AI - Senior Consultant</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --user-msg: #d2e3fc; --ai-msg: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: var(--bg); display: flex; flex-direction: column; height: 100vh; }
        
        /* Header */
        .header { background: var(--primary); color: white; padding: 15px 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header h1 { margin: 0; font-size: 1.2rem; }
        .header p { margin: 5px 0 0; font-size: 0.8rem; opacity: 0.9; }

        /* Chat Area */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 15px; line-height: 1.5; font-size: 0.95rem; word-wrap: break-word; position: relative; }
        .user { align-self: flex-end; background-color: var(--user-msg); color: #174ea6; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background-color: var(--ai-msg); color: #3c4043; border-bottom-left-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        
        /* Loading Animation */
        .typing { font-style: italic; font-size: 0.8rem; color: #70757a; display: none; margin-bottom: 10px; }

        /* Input Area */
        .input-area { background: white; padding: 15px; border-top: 1px solid #dadce0; display: flex; gap: 10px; align-items: center; }
        input { flex: 1; padding: 12px; border: 1px solid #dadce0; border-radius: 24px; outline: none; font-size: 1rem; }
        input:focus { border-color: var(--primary); }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 24px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #1557b0; }
    </style>
</head>
<body>

<div class="header">
    <h1>Gregorius.AI</h1>
    <p id="status-text">Mode: Konsultan Publik</p>
</div>

<div id="chat-container">
    <div class="message ai">Halo! Saya Gregorius.AI. Ada yang bisa saya bantu mengenai rencana studi atau beasiswa kamu ke China?</div>
</div>

<div id="typing-indicator" class="typing" style="padding-left: 20px;">Gregorius.AI sedang berpikir...</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Ketik pesan di sini..." autocomplete="off">
    <button onclick="sendMessage()">Kirim</button>
</div>

<script>
    let isMasterMode = false;
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('userInput');
    const typingIndicator = document.getElementById('typing-indicator');
    const statusText = document.getElementById('status-text');

    // Fungsi Kirim Pesan
    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // 1. Tampilkan pesan user
        appendMessage('user', text);
        userInput.value = '';
        typingIndicator.style.display = 'block';
        scrollToBottom();

        try {
            // 2. Hit ke API Railway
            const response = await fetch("https://gregoriusptlnchina-production.up.railway.app/improve/user_greg", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    text: text, 
                    isMasterMode: isMasterMode 
                })
            });

            const data = await response.json();

            // 3. Logika Update Mode (Master/Public)
            if (data.isMaster !== undefined) {
                isMasterMode = data.isMaster;
                statusText.innerText = isMasterMode ? "Mode: Akses Master Aktif 😎" : "Mode: Konsultan Publik";
                statusText.style.color = isMasterMode ? "#ccff00" : "white";
            }
            
            if (data.logout) isMasterMode = false;

            // 4. Tampilkan balasan AI
            appendMessage('ai', data.reply);

        } catch (error) {
            appendMessage('ai', "Error: Gagal terhubung ke server. Pastikan Railway kamu berstatus 'Active'.");
            console.error(error);
        } finally {
            typingIndicator.style.display = 'none';
            scrollToBottom();
        }
    }

    function appendMessage(sender, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;
        msgDiv.innerText = text;
        chatContainer.appendChild(msgDiv);
    }

    function scrollToBottom() {
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // Fitur Tekan Enter untuk Kirim
    userInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });
</script>

</body>
</html>
