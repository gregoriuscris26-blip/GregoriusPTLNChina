<!DOCTYPE html>
<html lang="id">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GREGORIUS.AI | IMPERIAL_DASHBOARD_V5</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Space+Grotesk:wght@300;500;700&family=Fira+Code:wght@400;500&family=Noto+Sans+SC:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --dynasty-red: #8b0000;
            --neon-crimson: #ff003c;
            --imperial-gold: #ffb300;
            --jade-green: #00ff95;
            --ink-black: #050505;
            --glass-dark: rgba(10, 10, 15, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--ink-black);
            color: #f1f5f9;
            font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- BACKGROUND ELEMENTS --- */
        #matrix-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.15;
        }

        .great-wall-bg {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 25%;
            background: linear-gradient(transparent, rgba(139, 0, 0, 0.15));
            mask-image: url('https://www.transparentpng.com/download/wall/great-wall-of-china-png-free-download-2.png');
            mask-size: cover; mask-repeat: no-repeat; mask-position: bottom;
            -webkit-mask-image: url('https://www.transparentpng.com/download/wall/great-wall-of-china-png-free-download-2.png');
            -webkit-mask-size: cover; -webkit-mask-repeat: no-repeat; -webkit-mask-position: bottom;
            opacity: 0.15; z-index: -1;
        }

        /* --- HEADER: MULTI-FEATURE DASHBOARD --- */
        .cyber-header {
            background: var(--glass-dark);
            backdrop-filter: blur(25px);
            padding: 1rem 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--imperial-gold);
            box-shadow: 0 0 30px rgba(255, 179, 0, 0.2);
            z-index: 100;
        }

        .system-id { display: flex; align-items: center; gap: 15px; }
        .hex-logo {
            width: 50px; height: 50px;
            background: var(--dynasty-red);
            border: 2px solid var(--imperial-gold);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 1.8rem; color: var(--imperial-gold);
            text-shadow: 0 0 10px var(--imperial-gold);
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }

        .title-group h1 {
            font-size: 1.2rem; font-weight: 900; letter-spacing: 3px;
            background: linear-gradient(to bottom, #fff, var(--imperial-gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .header-metrics { display: flex; gap: 12px; margin-top: 4px; }
        .metric-item { font-size: 0.55rem; color: var(--imperial-gold); font-family: 'Fira Code', monospace; opacity: 0.8; }

        /* Middle Dashboard Feature */
        .system-dashboard { display: flex; gap: 25px; margin-left: auto; margin-right: 40px; padding-left: 25px; border-left: 1px solid rgba(255, 255, 255, 0.1); }
        .stat-box { display: flex; flex-direction: column; align-items: center; }
        .stat-label { font-size: 0.5rem; color: #64748b; letter-spacing: 1px; }
        .stat-value { font-size: 0.85rem; color: var(--imperial-gold); font-weight: bold; text-shadow: 0 0 5px var(--imperial-gold); }

        .auth-pill {
            font-size: 0.65rem; color: white; background: var(--dynasty-red);
            border: 1px solid var(--imperial-gold); padding: 6px 15px; border-radius: 4px;
            font-weight: bold; cursor: help;
        }

        /* --- CHAT AREA --- */
        #main-chat-area {
            flex: 1; overflow-y: auto; padding: 2rem 1.5rem;
            display: flex; flex-direction: column; gap: 30px;
        }

        .msg-frame { animation: fadeInUp 0.4s ease-out both; width: 100%; display: flex; flex-direction: column; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .bubble {
            max-width: 85%; padding: 18px 22px; line-height: 1.7; font-size: 1rem;
            backdrop-filter: blur(10px); position: relative;
        }

        .ai-frame .bubble {
            background: rgba(20, 20, 25, 0.9);
            border: 1.5px solid var(--dynasty-red);
            border-image: repeating-linear-gradient(45deg, var(--dynasty-red), var(--dynasty-red) 5px, var(--imperial-gold) 2px, var(--imperial-gold) 8px) 1;
            border-radius: 0 20px 20px 20px;
            box-shadow: 10px 10px 25px rgba(0,0,0,0.4);
        }

        .user-frame { align-items: flex-end; }
        .user-frame .bubble {
            background: linear-gradient(135deg, var(--dynasty-red), var(--neon-crimson));
            color: white; border-radius: 20px 20px 0 20px;
            width: fit-content; border: 1px solid var(--imperial-gold);
            box-shadow: 0 5px 20px rgba(255, 0, 60, 0.3);
        }

        .hud-actions { display: none; gap: 15px; margin-top: 10px; padding-left: 10px; }
        .master-active .hud-actions { display: flex; }
        .hud-btn { background: none; border: none; color: var(--imperial-gold); font-size: 0.65rem; cursor: pointer; opacity: 0.7; }

        /* --- TERMINAL DECK --- */
        .terminal-deck { padding: 2rem 1.5rem; background: linear-gradient(0deg, var(--ink-black) 50%, transparent); }
        .console-box {
            background: rgba(25, 25, 30, 0.95); border: 2px solid var(--imperial-gold);
            border-radius: 12px; padding: 12px 20px; display: flex; align-items: center; gap: 15px;
            box-shadow: 0 0 20px rgba(255, 179, 0, 0.1);
        }

        input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 1.1rem; }
        .exec-trigger {
            width: 45px; height: 45px; background: var(--imperial-gold); color: var(--dynasty-red);
            border-radius: 8px; border: none; cursor: pointer; font-size: 1.2rem;
        }

        /* --- MASTER STATE --- */
        .master-active .cyber-header { border-bottom-color: var(--jade-green); box-shadow: 0 0 30px rgba(0, 255, 149, 0.3); }
        .master-active .hex-logo { border-color: var(--jade-green); color: var(--jade-green); text-shadow: 0 0 10px var(--jade-green); }
        .master-active .auth-pill { background: var(--jade-green); color: var(--ink-black); border-color: white; }

        @media (max-width: 768px) {
            .mobile-hide { display: none; }
            .system-dashboard { margin-right: 10px; gap: 15px; }
            .title-group h1 { font-size: 1rem; }
        }

        @media (min-width: 1024px) {
            #main-chat-area { padding: 4rem 30%; }
            .terminal-deck { padding: 3rem 30%; }
        }
    </style>
</head>
<body id="core-system">

<div class="great-wall-bg"></div>
<canvas id="matrix-canvas"></canvas>

<header class="cyber-header">
    <div class="system-id">
        <div class="hex-logo">龙</div>
        <div class="title-group">
            <h1>GREGORIUS.AI</h1>
            <div class="header-metrics">
                <span class="metric-item"><i class="fas fa-microchip"></i> BJ_CORE_01</span>
                <span class="metric-item"><i class="fas fa-clock"></i> <span id="bj-time">--:--</span> BJ</span>
            </div>
        </div>
    </div>

    <div class="system-dashboard">
        <div class="stat-box">
            <span class="stat-label">HSK_LVL</span>
            <span class="stat-value">VI</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">SCHOLAR_PROB</span>
            <span class="stat-value" id="prob-val">98.5%</span>
        </div>
        <div class="stat-box mobile-hide">
            <span class="stat-label">LATENCY</span>
            <span class="stat-value">22ms</span>
        </div>
    </div>

    <div id="auth-stat" class="auth-pill">GUEST_ACCESS</div>
</header>

<main id="main-chat-area"></main>

<div id="processing-overlay" style="display:none; text-align: center; color: var(--imperial-gold); padding: 15px;">
    <i class="fas fa-yin-yang fa-spin fa-2x"></i>
    <p style="font-size: 0.6rem; letter-spacing: 4px; margin-top: 8px;">CALCULATING_IMPERIAL_DATA...</p>
</div>

<footer class="terminal-deck">
    <div class="console-box">
        <button id="mic-btn" style="background:none; border:none; color:var(--imperial-gold); font-size: 1.4rem; cursor:pointer;">
            <i class="fas fa-microphone"></i>
        </button>
        <input type="text" id="userInput" placeholder="Ketik perintah atau tanya beasiswa..." autofocus autocomplete="off">
        <button class="exec-trigger" onclick="runCommand()">
            <i class="fas fa-bolt"></i>
        </button>
    </div>
</footer>

<script>
    let isMaster = false;
    const chatArea = document.getElementById('main-chat-area');
    const userInput = document.getElementById('userInput');
    const authStat = document.getElementById('auth-stat');

    // TTS Voice
    function tts(text) {
        if (!isMaster) return;
        window.speechSynthesis.cancel();
        const synth = new SpeechSynthesisUtterance(text.replace(/[#*`]/g, ''));
        synth.lang = 'id-ID';
        synth.rate = 1.0;
        window.speechSynthesis.speak(synth);
    }

    // Beijing Time Sync
    function updateClock() {
        const now = new Date();
        const bjTime = new Intl.DateTimeFormat('en-US', {
            timeZone: 'Asia/Shanghai', hour: '2-digit', minute: '2-digit', hour12: false
        }).format(now);
        document.getElementById('bj-time').innerText = bjTime;
    }
    setInterval(updateClock, 1000); updateClock();

    // Prob Randomizer
    setInterval(() => {
        let val = (98.0 + Math.random() * 0.9).toFixed(1);
        document.getElementById('prob-val').innerText = val + "%";
    }, 4000);

    // Matrix Rain (Hanzi + Numbers)
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();
    const chars = "龙学智慧北京上海诚实德福10";
    const drops = Array(Math.floor(canvas.width/20)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(5, 5, 5, 0.15)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = isMaster ? "#00ff95" : "#8b0000";
        ctx.font = "15px 'Ma Shan Zheng', monospace";
        drops.forEach((y, i) => {
            const txt = chars[Math.floor(Math.random()*chars.length)];
            ctx.fillText(txt, i*20, y*20);
            if(y*20 > canvas.height && Math.random() > 0.975) drops[i] = 0; drops[i]++;
        });
    }
    setInterval(draw, 70);

    // Initial Greeting
    window.onload = () => {
        appendMsg('ai', "Sistem **Gregorius.AI** aktif. Selamat datang di portal konsultasi pendidikan Tiongkok. Ada yang bisa saya bantu hari ini?");
    };

    async function runCommand() {
        const cmd = userInput.value.trim();
        if (!cmd) return;

        appendMsg('user', cmd);
        userInput.value = '';
        document.getElementById('processing-overlay').style.display = 'block';

        try {
            const response = await fetch("https://gregoriusptlnchina-production.up.railway.app/improve/user_greg", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: cmd, isMasterMode: isMaster })
            });
            const data = await response.json();

            if (data.isMaster !== undefined) {
                isMaster = data.isMaster;
                if(isMaster) {
                    document.body.classList.add('master-active');
                    authStat.innerHTML = "IMPERIAL_MASTER";
                    tts("Akses Master diterima. Selamat bertugas, Greg.");
                } else {
                    document.body.classList.remove('master-active');
                    authStat.innerHTML = "GUEST_ACCESS";
                }
            }

            appendMsg('ai', data.reply || "Gagal sinkronisasi data.");
            if (isMaster) tts(data.reply);
        } catch (e) {
            appendMsg('ai', "SYSTEM_ERROR: Koneksi ke node Beijing terputus.");
        } finally {
            document.getElementById('processing-overlay').style.display = 'none';
        }
    }

    function appendMsg(role, text) {
        const frame = document.createElement('div');
        frame.className = `msg-frame ${role}-frame`;
        const content = role === 'ai' ? marked.parse(text) : text;
        
        frame.innerHTML = `
            <div class="bubble">${content}</div>
            <div class="hud-actions">
                <button class="hud-btn" onclick="tts(\`${text.replace(/`/g, '\\`')}\`)"><i class="fas fa-volume-up"></i> REPLAY</button>
                <button class="hud-btn" onclick="navigator.clipboard.writeText(\`${text}\`)"><i class="fas fa-clone"></i> COPY</button>
            </div>
        `;
        chatArea.appendChild(frame);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") runCommand(); });
</script>
</body>
</html>
