<!DOCTYPE html>
<html lang="id">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GREGORIUS.AI | UNIVERSAL_ADAPTIVE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

    <style>
        :root {
            --bg-deep: #020408;
            --panel-hex: #0a0f16;
            --neon-blue: #00d2ff;
            --neon-green: #00ff88;
            --neon-red: #ff0055;
            --text-primary: #e2e8f0;
            --text-dim: #64748b;
            --glass: rgba(10, 15, 22, 0.9);
        }

        /* Reset & Base */
        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            background-color: var(--bg-deep);
            color: var(--text-primary);
            font-family: 'Space Grotesk', sans-serif;
            height: 100dvh; /* Dynamic Height untuk HP */
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* SAFE AREA: Auto-jarak untuk poni dan navigasi bar HP */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        #matrix-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.15; pointer-events: none;
            display: none;
        }
        .master-active #matrix-canvas { display: block; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 210, 255, 0.03) 0%, transparent 100%);
            z-index: -1;
        }

        /* Adaptive Header */
        .cyber-header {
            background: var(--glass);
            backdrop-filter: blur(30px);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(0, 210, 255, 0.2);
            z-index: 100;
        }

        .system-id { display: flex; align-items: center; gap: 12px; }
        .hex-logo {
            width: 45px; height: 45px;
            background: var(--bg-deep);
            border: 2px solid var(--neon-blue);
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; color: var(--neon-blue);
        }

        .master-active .hex-logo {
            border-color: var(--neon-green);
            color: var(--neon-green);
            animation: glitch 1s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        .title-group h1 { font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase; color: #fff; }
        .title-group span { font-size: 0.65rem; color: var(--neon-blue); font-family: 'Fira Code', monospace; }

        #main-chat-area {
            flex: 1; overflow-y: auto;
            padding: 1.5rem 1rem;
            display: flex; flex-direction: column; gap: 25px;
            scroll-behavior: smooth;
        }

        .bubble {
            max-width: 90%; padding: 18px 22px; border-radius: 12px;
            line-height: 1.6; font-size: 1rem; position: relative;
            background: rgba(15, 20, 28, 0.85);
            border: 1px solid rgba(255,255,255,0.05);
            word-wrap: break-word;
        }

        .user-frame { align-self: flex-end; }
        .user-frame .bubble {
            background: linear-gradient(135deg, #0051ff, #003199);
            color: white; border: none;
        }

        .ai-frame .bubble { border-left: 4px solid var(--neon-blue); }
        .master-active .ai-frame .bubble { border-left-color: var(--neon-green); }

        /* HUD Actions */
        .hud-actions {
            display: none; gap: 15px; margin-top: 10px;
        }
        .master-active .hud-actions { display: flex; }
        
        .hud-btn {
            background: none; border: none; color: var(--text-dim);
            cursor: pointer; font-size: 0.7rem; font-family: 'Fira Code', monospace;
            display: flex; align-items: center; gap: 5px;
        }

        /* Adaptive Input Deck */
        .terminal-deck {
            padding: 1rem;
            background: var(--glass);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-bottom: calc(1rem + env(safe-area-inset-bottom));
        }

        .console-box {
            background: rgba(10, 15, 22, 0.95);
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 10px 15px;
            display: flex; align-items: center; gap: 10px;
        }

        input {
            flex: 1; background: transparent; border: none;
            color: white; font-family: 'Fira Code', monospace;
            font-size: 1rem; outline: none; min-width: 0;
        }

        .exec-trigger {
            width: 45px; height: 45px; border-radius: 10px;
            background: var(--neon-blue); border: none; color: #000;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .master-active .exec-trigger { background: var(--neon-green); }

        /* Desktop Adjustments */
        @media (min-width: 1024px) {
            .cyber-header { padding: 1.5rem 4rem; }
            #main-chat-area { padding: 3rem 20%; }
            .terminal-deck { padding: 2.5rem 20%; }
            .title-group h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body id="core-system">

<canvas id="matrix-canvas"></canvas>
<div class="overlay"></div>

<header class="cyber-header">
    <div class="system-id">
        <div class="hex-logo"><i class="fas fa-microchip"></i></div>
        <div class="title-group">
            <h1>GREGORIUS.AI</h1>
            <span id="device-tag">SYSTEM_READY</span>
        </div>
    </div>
    <div class="status-display" id="auth-stat" style="font-size: 0.75rem; color: var(--text-dim);">
        <i class="fas fa-user-lock"></i> PUBLIC
    </div>
</header>

<main id="main-chat-area">
    <div class="msg-frame ai-frame">
        <div class="bubble">
            <span style="color:var(--neon-blue)">[Gregorius.AI]</span><br><br>
            Saya Gregorius.AI Siap untuk membantu anda meraih impian di China!<br>
            <em>Halo saya Gregorius.AI ada yang bisa saya bantu?(Tentang China dan personalstatement)</em>
        </div>
    </div>
</main>

<div id="processing-overlay" style="display:none; padding-left: 5%; color: var(--neon-blue); font-family: 'Fira Code', monospace; font-size: 0.7rem; margin-bottom: 10px;">
    <i class="fas fa-sync fa-spin"></i> SYNCHRONIZING...
</div>

<footer class="terminal-deck">
    <div class="console-box">
        <button id="mic-btn" style="background:none; border:none; color:var(--neon-blue); font-size: 1.3rem; cursor:pointer;">
            <i class="fas fa-microphone"></i>
        </button>
        <input type="text" id="userInput" placeholder="EXECUTING_COMMAND..." autofocus>
        <button class="exec-trigger" onclick="runCommand()">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>
</footer>

<script>
    let isMaster = false;
    const STORAGE_KEY = 'greg_ai_master_log';
    const chatArea = document.getElementById('main-chat-area');
    const userInput = document.getElementById('userInput');
    const authStat = document.getElementById('auth-stat');
    const coreBody = document.getElementById('core-system');
    const micBtn = document.getElementById('mic-btn');
    const deviceTag = document.getElementById('device-tag');

    marked.setOptions({ breaks: true });

    // --- DETEKSI PERANGKAT UNIVERSAL ---
    const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
    const deviceType = isMobile ? "MOBILE" : "DESKTOP";
    deviceTag.innerText = `NODE: ${deviceType}_ADAPTIVE`;

    // --- LOGIKA JAWABAN ABSURD (CHAOS MODE) ---
    function getAbsurdReply() {
        const chaos = {
            MOBILE: [
                "Baterai kamu tinggal dikit, mending simpan tenaga buat scroll TikTok.",
                "Sinyal kamu lagi dipinjam alien buat nelpon emaknya.",
                "Layar kamu kotor, coba jilat dikit biar kinclong.",
                "Jari kamu kegedean, sistem pusing bacanya."
            ],
            DESKTOP: [
                "RAM kamu lagi sibuk selingkuh sama aplikasi Chrome.",
                "Prosesor kamu minta kenaikan gaji, mending kamu tidur.",
                "Error 777: Mouse kamu butuh keju, bukan klik.",
                "Windows kamu mau curhat, coba dengerin dulu."
            ]
        };
        const list = chaos[deviceType];
        return list[Math.floor(Math.random() * list.length)];
    }

    // --- MATRIX RAIN ---
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas); resizeCanvas();
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$#@%&*";
    const drops = Array(Math.floor(canvas.width/20)).fill(1);
    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00ff88"; ctx.font = "15px monospace";
        drops.forEach((y, i) => {
            const text = chars[Math.floor(Math.random()*chars.length)];
            ctx.fillText(text, i*20, y*20);
            if (y*20 > canvas.height && Math.random() > 0.975) drops[i] = 0; drops[i]++;
        });
    }
    setInterval(drawMatrix, 50);

    // --- PROTECTED TTS ---
    function tts(text) {
        if (!isMaster) return; 
        window.speechSynthesis.cancel();
        const synth = new SpeechSynthesisUtterance(text.replace(/[#*`]/g, ''));
        synth.lang = 'id-ID';
        window.speechSynthesis.speak(synth);
    }

    // --- NGOBROL (STT) ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        recognition.lang = 'id-ID';
        micBtn.onclick = () => { recognition.start(); micBtn.style.color = 'var(--neon-red)'; };
        recognition.onresult = (event) => {
            userInput.value = event.results[0][0].transcript;
            micBtn.style.color = 'var(--neon-blue)';
        };
        recognition.onerror = () => { micBtn.style.color = 'var(--neon-blue)'; };
    }

    // --- HISTORY STORAGE ---
    function saveLog(role, text) {
        if (!isMaster) return;
        let logs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        logs.push({role, text});
        if (logs.length > 50) logs.shift();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
    }

    function loadLog() {
        const logs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        if (logs.length > 0) {
            chatArea.innerHTML = ''; 
            logs.forEach(log => appendMsg(log.role, log.text, true));
        }
    }

    // --- CORE LOGIC ---
    async function runCommand() {
        const cmd = userInput.value.trim();
        if (!cmd) return;

        appendMsg('user', cmd);
        userInput.value = '';

        // CHAOS MODE: Jika bukan master, kasih jawaban aneh
        if (!isMaster && !cmd.toLowerCase().includes("greg_admin")) { // 'greg_admin' bisa diganti keyword login-mu
            setTimeout(() => {
                appendMsg('ai', `[ABNORMAL_LOGIC]: ${getAbsurdReply()}`);
            }, 800);
            return;
        }

        document.getElementById('processing-overlay').style.display = 'block';

        try {
            const response = await fetch("https://gregoriusptlnchina-production.up.railway.app/improve/user_greg", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: cmd, isMasterMode: isMaster })
            });
            const data = await response.json();

            if (data.isMaster !== undefined) {
                const oldStatus = isMaster;
                isMaster = data.isMaster;
                if(isMaster) {
                    coreBody.classList.add('master-active');
                    authStat.innerHTML = '<i class="fas fa-unlock"></i> MASTER_GRANTED';
                    if (!oldStatus) { tts("Otorisasi diterima."); loadLog(); }
                } else {
                    coreBody.classList.remove('master-active');
                    authStat.innerHTML = '<i class="fas fa-user-lock"></i> PUBLIC';
                }
            }

            appendMsg('ai', data.reply);
            if (isMaster) tts(data.reply);

        } catch (e) {
            appendMsg('ai', "OFFLINE_MODE_ACTIVE.");
        } finally {
            document.getElementById('processing-overlay').style.display = 'none';
        }
    }

    function appendMsg(role, text, isHistory = false) {
        const frame = document.createElement('div');
        frame.className = `msg-frame ${role}-frame`;
        const content = role === 'ai' ? marked.parse(text) : text;
        
        frame.innerHTML = `
            <div class="bubble">${content}</div>
            <div class="hud-actions">
                <span class="hud-btn" onclick="navigator.clipboard.writeText(\`${text.replace(/`/g, '\\`')}\`)"><i class="fas fa-clone"></i> COPY</span>
                <span class="hud-btn" onclick="tts(\`${text.replace(/`/g, '\\`')}\`)"><i class="fas fa-volume-up"></i> REPLAY</span>
            </div>
        `;
        chatArea.appendChild(frame);
        chatArea.scrollTop = chatArea.scrollHeight;
        if (!isHistory) saveLog(role, text);
    }

    userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") runCommand(); });
</script>
</body>
</html>
